env_id: Walker2d-v5
seed: 1
total_timesteps: 2000000
lr_anneal_timesteps: 2000000

num_envs: 8
rollout_steps: 2048
num_minibatches: 16
update_epochs: 5

gamma: 0.99
gae_lambda: 0.95
learning_rate: 2.0e-4
anneal_lr: true

clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: 0.02

normalize_obs: true
normalize_rewards: true
reward_clip: 10.0
normalize_advantages: true
clip_value_loss: true

hidden_sizes: [256, 256]
activation: tanh
log_std_init: -0.5

eval_interval: 50000
num_eval_episodes: 10
checkpoint_interval: 100000
save_video: false
