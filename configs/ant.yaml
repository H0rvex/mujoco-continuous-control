env_id: Ant-v5
seed: 1
total_timesteps: 5000000

num_envs: 8
rollout_steps: 1024
num_minibatches: 32
update_epochs: 10

gamma: 0.99
gae_lambda: 0.95
learning_rate: 3.0e-4
anneal_lr: true

clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: 0.03

normalize_obs: true
normalize_advantages: true
clip_value_loss: true

hidden_sizes: [256, 256]
activation: tanh
log_std_init: -0.5

eval_interval: 100000
num_eval_episodes: 10
checkpoint_interval: 250000
save_video: false
